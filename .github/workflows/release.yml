name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Wersja bez literki v (np. 1.0.1)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Ustal wersje
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
            $v = $env:GITHUB_REF -replace 'refs/tags/v', ''
          } else {
            $v = '${{ github.event.inputs.version }}'
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Wersja: $v"

      - name: Publish (single-file, self-contained)
        shell: pwsh
        run: |
          dotnet publish GhostDeck.csproj -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:DebugType=none `
            -p:Version=${{ steps.ver.outputs.version }} -o publish

      - name: Extract release notes from CHANGELOG
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.version }}'
          $body = "Release $v"
          if (Test-Path CHANGELOG.md) {
            $cl = Get-Content CHANGELOG.md -Raw
            $m = [regex]::Match($cl, "(?ms)^##\s*\[?$([regex]::Escape($v))\]?.*?(?=^##\s|\z)")
            if ($m.Success) { $body = $m.Value.Trim() }
          }
          $body | Out-File release_notes.md -Encoding utf8

      - name: Utworz Release i dolacz exe
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: GhostDeck v${{ steps.ver.outputs.version }}
          body_path: release_notes.md
          generate_release_notes: true
          files: publish/GhostDeck.exe
